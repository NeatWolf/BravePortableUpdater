name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows:
    name: Windows verification
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify updater script boundary
        shell: powershell
        run: |
          $actual = @(git ls-files -- '*.cmd' '*.ps1')
          $expected = @('Update-BravePortable.cmd', 'Update-BravePortable.ps1')
          $diff = Compare-Object -ReferenceObject $expected -DifferenceObject $actual
          if ($diff) {
              $actual | ForEach-Object { "Tracked script: $_" }
              throw 'Unexpected tracked .cmd or .ps1 file set.'
          }
          'tracked updater script boundary OK'

      - name: Verify checksum manifest
        shell: powershell
        run: |
          $expected = @{}
          Get-Content -LiteralPath .\SHA256SUMS.txt | ForEach-Object {
              if ($_ -notmatch '^([a-f0-9]{64})\s+(\S+)$') {
                  throw "Bad checksum line: $_"
              }
              $expected[$Matches[2]] = $Matches[1]
          }
          foreach ($name in 'Update-BravePortable.cmd', 'Update-BravePortable.ps1') {
              $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath ".\$name").Hash.ToLowerInvariant()
              if ($expected[$name] -ne $actual) {
                  throw "Checksum mismatch for $name"
              }
          }
          'checksum manifest OK'

      - name: Parse PowerShell script
        shell: powershell
        run: |
          $tokens = $null
          $errors = $null
          $path = (Resolve-Path -LiteralPath .\Update-BravePortable.ps1).Path
          [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count) {
              $errors | ForEach-Object Message
              exit 1
          }
          'PowerShell parse OK'

      - name: Run PSScriptAnalyzer
        shell: powershell
        run: |
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery
          Import-Module PSScriptAnalyzer -Force
          $results = Invoke-ScriptAnalyzer -Path .\Update-BravePortable.ps1 -Severity Information,Warning,Error
          if ($results) {
              $results | Format-Table -AutoSize
              exit 1
          }
          'PSScriptAnalyzer passed with no findings.'
