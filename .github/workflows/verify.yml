name: Verify

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    name: PowerShell updater checks
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm updater script boundary
        shell: pwsh
        run: |
          $scripts = @(git ls-files -- '*.cmd' '*.ps1')
          $expected = @('Update-BravePortable.cmd', 'Update-BravePortable.ps1')
          $extra = @($scripts | Where-Object { $_ -notin $expected })
          $missing = @($expected | Where-Object { $_ -notin $scripts })
          if ($extra.Count -or $missing.Count) {
              Write-Error "Tracked updater scripts must be exactly: $($expected -join ', ')"
              Write-Error "Found: $($scripts -join ', ')"
              exit 1
          }

      - name: Verify checksum manifest
        shell: pwsh
        run: |
          $expected = @{}
          Get-Content -LiteralPath .\SHA256SUMS.txt | ForEach-Object {
              if ($_ -notmatch '^([a-f0-9]{64})\s+(\S+)$') {
                  throw "Bad checksum line: $_"
              }
              $expected[$Matches[2]] = $Matches[1]
          }

          foreach ($name in 'Update-BravePortable.cmd', 'Update-BravePortable.ps1') {
              $actual = (Get-FileHash -Algorithm SHA256 -LiteralPath ".\$name").Hash.ToLowerInvariant()
              if ($expected[$name] -ne $actual) {
                  throw "Checksum mismatch for $name"
              }
          }

      - name: Parse PowerShell script
        shell: pwsh
        run: |
          $tokens = $null
          $errors = $null
          $path = (Resolve-Path -LiteralPath .\Update-BravePortable.ps1).Path
          [System.Management.Automation.Language.Parser]::ParseFile($path, [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count) {
              $errors | ForEach-Object { Write-Error $_.Message }
              exit 1
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Scope CurrentUser -Repository PSGallery -Force -ErrorAction Stop
          $results = Invoke-ScriptAnalyzer -Path .\Update-BravePortable.ps1 -Severity Information,Warning,Error
          if ($results) {
              $results | Format-Table -AutoSize
              exit 1
          }
